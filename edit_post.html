<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Post</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 50px;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            height: 120px;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }

        .btn-update {
            background: #007bff;
            float: right;
        }

        .btn-back {
            background: #6c757d;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Edit Blog Post</h2>

    <!-- ✅ FORM -->
    <form th:action="@{/save}" method="post" th:object="${post}">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{id}">

        <label>Title</label>
        <input type="text" th:field="*{title}" required>

        <label>Author</label>
        <input type="text" th:field="*{author}" required>

        <label>Content</label>
        <textarea th:field="*{content}" required></textarea>

        <!-- Buttons -->
        <button type="button" class="btn btn-back" onclick="window.location.href='/'">
            Back
        </button>

        <button type="submit" class="btn btn-update">
            Update Post
        </button>

    </form>

</div>

</body>
</html>
