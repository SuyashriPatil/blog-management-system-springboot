<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Blog Posts</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #444;
        }

        .btn {
            display: inline-block;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-add {
            background: #28a745;
        }

        .btn-edit {
            background: #007bff;
        }

        .btn-delete {
            background: #dc3545;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #667eea;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #ddd;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h2>📘 Blog Management System</h2>
        <a href="/new" class="btn btn-add">+ Add New Post</a>
    </div>

    <!-- ✅ Enter Post ID UI -->
    <div style="text-align:center; margin-top:15px;">
        <input type="number" id="postIdInput" placeholder="Enter Post ID"
               style="padding:8px; border-radius:6px; border:1px solid #ccc;">

        <button class="btn btn-edit" onclick="editPost()">Edit</button>
        <button class="btn btn-delete" onclick="deletePost()">Delete</button>
    </div>

    <table>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Content</th>
        </tr>

        <tr th:each="post : ${listPosts}">
            <td th:text="${post.title}">Post Title</td>
            <td th:text="${post.author}">Author</td>
            <td th:text="${post.content}">Content</td>
        </tr>
    </table>

</div>

<!-- ✅ JavaScript -->
<script>
    function editPost() {
        const id = document.getElementById("postIdInput").value;

        if (id) {
            window.location.href = "/edit/" + id;
        } else {
            alert("Please enter a valid Post ID.");
        }
    }

    function deletePost() {
        const id = document.getElementById("postIdInput").value;

        if (id && confirm("Are you sure you want to delete this post?")) {
            window.location.href = "/delete/" + id;
        } else {
            alert("Please enter a valid Post ID.");
        }
    }
</script>

</body>
</html>
